    <div class="content">
      <h1>Lecture 2 – Forms & Inputs</h1>

      <details open>
        <summary>Form Basics</summary>
        <p>
          &lt;form&gt; collects user input. Input types include text, radio,
          checkbox, submit, password, etc.
        </p>
      </details>

      <details>
        <summary>Example Form</summary>
        <form>
          <label>Name:</label><br />
          <input type="text" placeholder="Enter name" /><br /><br />

          <label>Gender:</label><br />
          <input type="radio" name="gender" /> Male<br />
          <input type="radio" name="gender" /> Female<br /><br />

          <input type="submit" value="Submit" />
        </form>
      </details>

      <details>
        <summary>Textarea & Select</summary>
        <form>
          <label>Feedback:</label><br />
          <textarea rows="4" cols="30"></textarea><br /><br />

          <label>Choose Topic:</label><br />
          <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option></select
          ><br /><br />
          <input type="submit" value="Submit" />
        </form>
      </details>
    </div>
